services:
  web:
    build:
      context: .
    image: linknest:latest
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      RACK_ENV: production
      DATABASE_URL: ${PROD_DATABASE_URL:-${DATABASE_URL}}
      RAILS_LOG_TO_STDOUT: "1"
      RAILS_SERVE_STATIC_FILES: "1"
    ports:
      - "3000:80"
    volumes:
      - bundle:/usr/local/bundle
      - storage:/rails/storage
      - log:/rails/log
      - tmp:/rails/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  job_processor:
    image: linknest:latest
    build:
      context: .
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      RACK_ENV: production
      DATABASE_URL: ${PROD_DATABASE_URL:-${DATABASE_URL}}
      RAILS_LOG_TO_STDOUT: "1"
    command: ./bin/jobs run
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - bundle:/usr/local/bundle
      - storage:/rails/storage
      - log:/rails/log
      - tmp:/rails/tmp
    restart: unless-stopped

volumes:
  bundle:
  storage:
  log:
  tmp: