# Nginx config for LinkNest (linknest.info)
# Place this file in /etc/nginx/sites-available/linknest.info.conf (Ubuntu/Debian)
# or include it from your nginx.conf on macOS Homebrew.

upstream linknest_app {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name linknest.info www.linknest.info;

  # ACME challenge for certbot renewals
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all plain HTTP traffic to HTTPS
  location / {
    return 301 https://linknest.info$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name linknest.info www.linknest.info;

  # Certbot-managed certificates
  ssl_certificate /etc/letsencrypt/live/linknest.info/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/linknest.info/privkey.pem;

  # TLS hardening baseline
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  client_max_body_size 25m;

  # Static asset caching for fingerprinted assets and media
  location ~* \.(?:css|js|mjs|json|map|jpg|jpeg|gif|png|webp|svg|ico|woff|woff2|ttf)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    proxy_pass http://linknest_app;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Default app traffic
  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_pass http://linknest_app;
  }
}

# Required for websocket upgrade connection handling
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}
